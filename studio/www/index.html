<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta
			name="description"
			content="Change image color palette to match a theme"
		>
		<meta name="color-scheme" content="dark light">
		<link rel="stylesheet" href="styles.css">
		<title>Repalette</title>
		<script>
			{
				const query = globalThis.matchMedia('(prefers-color-scheme: light)')
				const systemTheme = query.matches ? 'light' : 'dark'
				const theme = localStorage.getItem('repalette:theme') ?? systemTheme
				document.documentElement.setAttribute('data-theme', theme)
			}
		</script>
		<script type="module" src="index.js"></script>
	</head>

						/>
					</svg>

					Source

			</div>
		</nav>

					</div>
				</div>

</html>
